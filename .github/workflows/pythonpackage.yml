name: Json2xml

on:
  push:
    branches: [main, master]
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - '*.rst'
  pull_request:
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - '*.rst'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    permissions:
      contents: read
      id-token: write
    env:
      FLAKINESS_PROJECT: vinitkumar/json2xml
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Pin PyPy 3.11 to the 7.3.23 build so CI keeps exercising the
        # CPython 3.11.15-compatible runtime documented in BENCHMARKS.md.
        python-version: [pypy-3.10, pypy-3.11-v7.3.23, '3.10', '3.11', '3.12', '3.13', '3.14', '3.14t', '3.15.0-beta.3']
        os: [
          ubuntu-latest,
          windows-latest,
          macos-latest,
          "ubuntu-24.04-arm"
        ]
        exclude:
          - os: ubuntu-latest
            python-version: '3.14t'
    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        persist-credentials: false

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
      with:
        python-version: ${{ matrix.python-version }}
        allow-prereleases: true

    - name: Verify freethreaded Python
      if: endsWith(matrix.python-version, 't')
      run: |
        python --version --version
        python -c "import sys; print('Free-threading enabled:', not sys._is_gil_enabled() if hasattr(sys, '_is_gil_enabled') else False)"

    - name: Install uv
      uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
      with:
        enable-cache: true
        cache-dependency-glob: |
          requirements*.txt
          requirements-dev.in
          pyproject.toml

    - name: Install dependencies
      run: |
        uv pip install --system -e .
        uv pip install --system pytest pytest-xdist pytest-cov xmltodict pytest-flakiness

    - name: Create coverage directory
      run: mkdir -p coverage/reports

    - name: Run tests
      run: |
        pytest --cov=json2xml --cov-report=xml:coverage/reports/coverage.xml --cov-report=term --cov-fail-under=100 -xvs tests -n auto
      env:
        PYTHONPATH: ${{ github.workspace }}

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
      if: success()
      with:
        directory: ./coverage/reports/
        env_vars: OS,PYTHON
        fail_ci_if_error: false  # Don't fail CI if codecov upload fails
        files: ./coverage/reports/coverage.xml
        flags: unittests
        token: ${{ secrets.CODECOV_TOKEN }}
        name: codecov-umbrella
        verbose: true
      env:
        OS: ${{ matrix.os }}
        PYTHON: ${{ matrix.python-version }}

  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        persist-credentials: false

    - name: Set up Python 3.12
      uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
      with:
        python-version: '3.12'

    - name: Install uv
      uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
      with:
        enable-cache: true
        cache-dependency-glob: |
          requirements*.txt
          requirements-dev.in
          pyproject.toml

    - name: Install dependencies
      run: |
        uv pip install --system -e .

    - name: Run ruff
      run: uvx ruff check json2xml tests
